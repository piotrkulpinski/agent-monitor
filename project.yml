name: AgentMonitor
options:
  bundleIdPrefix: dev.piotrkulpinski
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
targets:
  AgentMonitor:
    type: application
    platform: macOS
    sources:
      - path: AgentMonitor
    info:
      path: AgentMonitor/Info.plist
      properties:
        CFBundleIdentifier: dev.piotrkulpinski.AgentMonitor
        CFBundleName: AgentMonitor
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.piotrkulpinski.AgentMonitor
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: AgentMonitor/Info.plist
